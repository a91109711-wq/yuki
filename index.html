<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音圓戰情指揮中心 (115年4月版)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
        .container { max-width: 600px; margin-top: 40px; }
        .header-section { background-color: #343a40; color: white; padding: 30px; border-radius: 10px; margin-bottom: 30px; text-align: center; }
        .menu-btn { width: 100%; padding: 15px; font-size: 1.1em; font-weight: bold; margin-bottom: 15px; border-radius: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-section">
        <h2>🌐 音圓戰情指揮中心</h2>
        <p class="text-white-50 mb-0">全面鎖定：網路協議價 (115年4月新版)</p>
    </div>

    <div class="card p-3 text-dark mb-4 border-0 shadow-sm">
        <h6 class="text-muted mb-3">🧮 快速手動判定</h6>
        <div class="input-group">
            <select class="form-select" id="modelSelect" onchange="updateLimitText()">
                <option value="62000">PARTY-7000 ($62,000)</option>
                <option value="50900">STAR-55 ($50,900)</option>
                <option value="42900">STAR-25 ($42,900)</option>
                <option value="52000">N2-550 ($52,000)</option>
                <option value="47500">N2-350 ($47,500)</option>
                <option value="40500">P-268 ($40,500)</option>
            </select>
        </div>
        <div class="input-group mt-2">
            <input type="number" class="form-control" id="priceInput" placeholder="輸入賣家標價">
            <button class="btn btn-danger" type="button" onclick="checkPrice()">判定</button>
        </div>
        <div id="resultArea" class="mt-2 fw-bold text-danger"></div>
    </div>

    <div class="card p-4 shadow-sm border-0">
        <a href="room1.html" class="btn btn-danger menu-btn">🔥 進入【一級戰區】(蝦皮、酷澎)</a>
        <a href="room2.html" class="btn btn-primary menu-btn">🛒 進入【大型商城】(MOMO、PChome等)</a>
        <a href="room3.html" class="btn btn-success menu-btn text-white">📡 進入【雷達掃描】(比價網全面搜)</a>
        <a href="https://a91109711-wq.github.io/Iygame/" class="btn btn-info menu-btn text-white" target="_blank">🎁 IY Q&A</a>
    </div>
</div>

<script>
    function checkPrice() {
        var limitPrice = parseInt(document.getElementById("modelSelect").value);
        var inputPrice = parseInt(document.getElementById("priceInput").value);
        var resultArea = document.getElementById("resultArea");
        if (isNaN(inputPrice)) return;
        if (inputPrice < limitPrice) {
            resultArea.innerText = "🚨 違規！低於底限 $" + (limitPrice - inputPrice).toLocaleString();
            resultArea.className = "mt-2 fw-bold text-danger";
        } else {
            resultArea.innerText = "✅ Pass！價格合規";
            resultArea.className = "mt-2 fw-bold text-success";
        }
    }
</script>
</body>
</html>
