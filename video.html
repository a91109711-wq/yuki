<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音圓教學影片</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a1a; /* 深色質感背景 */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: "Microsoft JhengHei", Arial, sans-serif;
        }

        /* 影片外層容器 */
        .video-wrapper {
            position: relative;
            width: 90%;
            max-width: 1000px;
            background: #000;
            border-radius: 12px;
            overflow: hidden; /* 圓角裁切 */
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); /* 立體陰影 */
        }

        /* RWD 響應式比例控制 (16:9) */
        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 比例 */
            height: 0;
            overflow: hidden;
        }

        /* 讓 Google 雲端影片充滿容器 */
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        /* 右上角的浮動按鈕 */
        .link-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 20; /* 確保在影片上層 */
            
            background: rgba(231, 76, 60, 0.9); /* 紅色底 */
            color: white;
            padding: 8px 16px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 5px;
            font-size: 1rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 5px;
            backdrop-filter: blur(5px); /* 模糊背景效果 */
        }

        .link-btn:hover {
            background: rgba(192, 57, 43, 1);
            transform: scale(1.05); /* 微微放大效果 */
        }

        /* 手機版微調 */
        @media (max-width: 600px) {
            .link-btn {
                font-size: 0.8rem;
                padding: 6px 12px;
                top: 10px;
                right: 10px;
            }
        }
    </style>
</head>
<body>

    <div class="video-wrapper">
        
        <a href="https://a91109711-wq.github.io/Iy-picket/" target="_blank" class="link-btn">
            🔍 查價平台
        </a>

        <div class="video-container">
            <iframe src="https://drive.google.com/file/d/1LGAZVA_KBr_VPSUCeiNcJpCyoYohgT7c/preview" allow="autoplay"></iframe>
        </div>

    </div>

</body>
</html>
